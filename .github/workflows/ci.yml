name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        env:
          # GitHub Actions sets GITHUB_ACTIONS=true, which makes Typer/Rich
          # render option names with ANSI segments. The CLI tests assert plain
          # error-message substrings, so use a dumb terminal for deterministic
          # output in CI.
          TERM: dumb
        run: python -m pytest -q
