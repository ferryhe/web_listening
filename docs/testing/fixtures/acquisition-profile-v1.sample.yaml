schema_version: acquisition-profile.v1
profile_id: example-association-acquisition-profile
site_key: example-association
generated_at: '2026-05-12T12:00:00Z'
strategy: http-first-with-open-fallbacks
default_adapter: web_http
fallback_order:
- browser_rendered
- sitemap
- rss
- batch_python
quality_gates:
  min_words: 120
  min_links: 3
  min_document_links: 0
  require_status_ok: true
  blocked_markers:
  - access denied
  - captcha
  - cloudflare
  - enable javascript
  - forbidden
safety:
  allowed_domains:
  - example.org
  allow_stealth_browser: false
  require_authorized_access: false
adapters:
- adapter: web_http
  enabled: true
  reason: Default low-cost HTTP capture for public pages.
  config:
    timeout_seconds: 30
  safety: {}
- adapter: browser_rendered
  enabled: true
  reason: Fallback for pages that need client-side rendering.
  config:
    wait_until: networkidle
  safety: {}
- adapter: sitemap
  enabled: true
  reason: Fallback discovery path for sites with useful sitemap XML.
  config:
    paths:
    - /sitemap.xml
  safety: {}
- adapter: rss
  enabled: true
  reason: Fallback discovery path for sites exposing feeds.
  config:
    paths:
    - /feed.xml
  safety: {}
- adapter: batch_python
  enabled: true
  reason: Reserved for explicit site-specific batch acquisition scripts.
  config: {}
  safety: {}
notes:
- Control artifact only; crawler and staged workflow integration are future work.
